# : << EOF

# ==============================================================================
# Core Settings
# ==============================================================================

# Use correct shell
set -g default-command /bin/zsh

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Increase history limit
set -g history-limit 102400

# Don't wait for escape sequences
set -sg escape-time 0

# Don't exit from tmux when closing a session
set -g detach-on-destroy off

# Make sure colors work
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ==============================================================================
# Activity Monitoring
# ==============================================================================

set -g monitor-activity on
set -g visual-activity off

# ==============================================================================
# Vim Integration
# ==============================================================================

# Enable focus events for Vim
set-option -g focus-events on

# Use Vim keybindings in copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'

# ==============================================================================
# Image Support
# ==============================================================================

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ==============================================================================
# Windows and Panes
# ==============================================================================

# New window retains current path, possible values are:
tmux_conf_new_window_retain_current_path=false

# New pane retains current path, possible values are:
tmux_conf_new_pane_retain_current_path=true

# Rename windows with "," - don't rename windows automatically
set -g automatic-rename off

# Renumber windows when a window is closed
set -g renumber-windows on

# Start windows numbering at 1
set -g base-index 1

# Make pane numbering consistent with windows
set -g pane-base-index 1

# ==============================================================================
# Key Bindings
# ==============================================================================

# Use . to reload tmux config
bind-key . source-file "$HOME/.config/tmux/tmux.conf" \; \
    display-message "Config reloaded!"
    run-shell "~/.config/tmux/plugins/tpm/bin/install_plugins" \; \

# Skip close confirmation prompt
bind-key & kill-window
bind-key x kill-pane

# Use current path when splitting window
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Rename window
bind-key r command-prompt -I "#W" "rename-window '%%'"

# # AI
bind-key a split-window -h -f -l 80 -c "#{pane_current_path}" \
  "claude -c --dangerously-skip-permissions || \
  claude --dangerously-skip-permissions"
#
# # Commit
# bind-key g run-shell 'cd "#{pane_current_path}" && tmux-git-commit'
#
# # Dotfiles
# bind-key d run-shell "sesh connect Dotfiles"
#
# # Kill Server
# bind-key k kill-server
#
# # Mail
# bind-key m run-shell "sesh connect Mail"
#
# # Notes
# bind-key N run-shell "sesh connect Notes"
#
# # Yazi
# bind-key o run-shell "sesh connect Yazi"


# ==============================================================================
# Status Bar Configuration
# ==============================================================================

# Position at top
set -g status-position top

# Redraw status line every second
set -g status-interval 1

# Increase status space
set -g status-left-length 30
set -g status-right-length 80

# ==============================================================================
# Status Bar Styling
# ==============================================================================

# Status line colors
set -g status-style bg='#26233a',fg='#e0def4'

# Status left
set -g status-left '\
#[bg=cyan]#[fg=#26233a]   #S \
#[bg=#26233a]#[fg=cyan,bg=#26233a] \
'

# Status right
set -g status-right '\
#{prefix_highlight}\
#{?window_zoomed_flag,#[fg=#ebbcba]  ,} \
#[fg=#{?#{>=:#{cpu_percentage},80},#eb6f92,#{?#{>=:#{cpu_percentage},50},#f6c177,#31748f}}] #{cpu_percentage} \
#[fg=#eb6f92]#([[ $(git -C $DOTFILES diff --exit-code $BREWFILE) ]] && echo " ") \
#[fg=#c4a7e7]#{online_status}  \
#[fg=cyan,bg=#26233a]\
#[fg=#26233a,bg=cyan] %H:%M \
'

# ==============================================================================
# Visual Elements
# ==============================================================================

# Popups
set -g popup-border-style "fg=#c4a7e7,bg=#26233a"

# Window tabs
set -g window-status-separator " "
set -g window-status-activity-style 'fg=#eb6f92,bg=#26233a'
set -g window-status-format "#[fg=#6e6a86,bg=#26233a] #W "
set -g window-status-current-format "#[fg=#ebbcba,bg=#26233a, bold] #W "

# Pane borders
set -g pane-active-border-style 'fg=#c4a7e7'
set -g pane-border-style 'fg=#26233a'

# Active window background
setw -g window-active-style 'bg=#191724'

# Message style
set -g message-style bg=#f6c177,fg=#26233a

# ==============================================================================
# Session Management (Sesh)
# ==============================================================================

bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind -N "last-session (via sesh) " L run-shell "sesh last"

# ==============================================================================
# Plugins
# ==============================================================================

# Tmux Plugin Manager (TPM)
set -g @plugin 'tmux-plugins/tpm'

# Show online status
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @online_icon ""
set -g @offline_icon ""

# Use FZF to open files
# Opens links with prefix + u
set -g @plugin 'wfxr/tmux-fzf-url'

# Tmux Prefix Highlight
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_output_prefix ' '
set -g @prefix_highlight_fg cyan # default is 'colour231'
set -g @prefix_highlight_bg '#26233a'  # default is 'colour04'

# Show network speed
set -g @plugin 'minhdanh/tmux-network-speed'

# Show CPU usage 
set -g @plugin 'tmux-plugins/tmux-cpu'

# Smart Splits
set -g @plugin 'mrjones2014/smart-splits.nvim'
# These bindings should reflect those set in the Neovim configuration
set -g @smart-splits_resize_left_key "C-M-h"
set -g @smart-splits_resize_right_key "C-M-l"
set -g @smart-splits_resize_down_key "C-M-j"
set -g @smart-splits_resize_up_key "C-M-k"

# Initialize plugin manager
run '~/.config/tmux/plugins/tpm/tpm'
