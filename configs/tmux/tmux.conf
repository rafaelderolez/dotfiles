# ==============================================================================
# Prefix
# ==============================================================================

set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# ==============================================================================
# Core Settings
# ==============================================================================

set -g default-command /bin/zsh
set -g mouse on
set -g history-limit 102400
set -sg escape-time 0
set -g detach-on-destroy off
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g focus-events on
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# ==============================================================================
# Windows and Panes
# ==============================================================================

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g automatic-rename-format '#(tmux-window-name "#{pane_current_path}" "#{pane_current_command}")'
set -g monitor-activity on
set -g visual-activity off

# ==============================================================================
# Copy Mode (vi + pbcopy)
# ==============================================================================

setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'

# ==============================================================================
# Key Bindings
# ==============================================================================

# Reload config
bind-key . source-file "$HOME/.config/tmux/tmux.conf" \; \
    display-message "Config reloaded!" \; \
    run-shell "~/.config/tmux/plugins/tpm/bin/install_plugins"

# Splits — h horizontal, v vertical (retain current path)
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Pane navigation (no prefix)
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

# Pane resize (no prefix)
bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Right resize-pane -R 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Down resize-pane -D 5

# Window navigation (no prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Window management
bind-key c new-window -c "#{pane_current_path}"
bind-key r command-prompt -I "#W" "rename-window '%%'"
bind-key & kill-window
bind-key x kill-pane
bind-key p previous-window
bind-key n next-window
bind -n M-h previous-window
bind -n M-l next-window

# Claude AI side pane
bind-key a split-window -h -f -l 80 -c "#{pane_current_path}" \
  "claude -c --dangerously-skip-permissions || \
  claude --dangerously-skip-permissions"

# ==============================================================================
# Session Management (Sesh)
# ==============================================================================

bind-key "t" run-shell "sesh connect \"$(
  sesh list -T --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^(a)ll -- ^(t)mux -- ^confi(g)s -- ^zo(x)ide  -- ^d tmux kill -- ^(f)ind' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -T --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

bind -N "last-session (via sesh)" L run-shell "sesh last"

# ==============================================================================
# Status Bar
# ==============================================================================

set -g status-position top
set -g status-interval 1
set -g status-left-length 30
set -g status-right-length 80

# Tokyo Night colors
# bg:      #1a1b26 (storm bg)
# fg:      #c0caf5 (foreground)
# blue:    #7aa2f7
# purple:  #bb9af7
# cyan:    #7dcfff
# green:   #9ece6a
# yellow:  #e0af68
# red:     #f7768e
# dark:    #15161e
# comment: #565f89

set -g status-style bg='#1a1b26',fg='#c0caf5'

set -g status-left '\
#[bg=#7aa2f7]#[fg=#1a1b26,bold]  #S \
#[bg=#1a1b26]#[fg=#7aa2f7] \
'

set -g status-right '\
#{prefix_highlight}\
#{?window_zoomed_flag,#[fg=#bb9af7]  ,}\
#[fg=#{?#{>=:#{cpu_percentage},80},#f7768e,#{?#{>=:#{cpu_percentage},50},#e0af68,#9ece6a}}] #{cpu_percentage} \
#[fg=#7aa2f7,bg=#1a1b26]\
#[fg=#1a1b26,bg=#7aa2f7,bold] %H:%M \
'

# ==============================================================================
# Visual Elements
# ==============================================================================

# Popups
set -g popup-border-style "fg=#bb9af7,bg=#1a1b26"

# Window tabs
set -g window-status-separator " "
set -g window-status-activity-style 'fg=#f7768e,bg=#1a1b26'
set -g window-status-format "#[fg=#565f89,bg=#1a1b26] #W "
set -g window-status-current-format "#[fg=#7dcfff,bg=#1a1b26,bold] #W "

# Pane borders
set -g pane-active-border-style 'fg=#bb9af7'
set -g pane-border-style 'fg=#1a1b26'

# Active window background
setw -g window-active-style 'bg=#15161e'

# Message & mode
set -g message-style bg='#e0af68',fg='#1a1b26'
set -g mode-style bg='#7aa2f7',fg='#1a1b26'

# ==============================================================================
# Plugins
# ==============================================================================

set -g @plugin 'tmux-plugins/tpm'

# Fuzzy-find URLs in pane (prefix + u)
set -g @plugin 'wfxr/tmux-fzf-url'

# CPU usage for status bar
set -g @plugin 'tmux-plugins/tmux-cpu'

# Prefix highlight
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_output_prefix ' '
set -g @prefix_highlight_fg '#7aa2f7'
set -g @prefix_highlight_bg '#1a1b26'

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'
